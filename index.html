<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CricLive HD</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.4/dist/controls.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-color: #0a0f18;
    --accent-blue: #00d2ff; 
    --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
    --card-bg: #161e2d;
    --text-light: #ffffff;
    --text-muted: #94a3b8;
    --border-color: #232d3f;
    --popup-shadow-color: rgba(0, 210, 255, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at top right, #1e293b, #0a0f18);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
}

.container {
    width: 100%;
    max-width: 850px;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeIn 0.6s ease-out forwards;
}

@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

.stream-header {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 1rem 1.5rem;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    backdrop-filter: blur(10px);
}

.stream-header h1 { 
    font-size: 1.4rem; 
    font-weight: 800;
    letter-spacing: -0.5px;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.live-badge {
    background-color: #ef4444;
    color: white;
    padding: 0.3rem 0.8rem;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
}

#player-container {
    width: 100%;
    height: 50vh;
    background-color: #000;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border-color);
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1.25rem;
}

.info-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    transition: transform 0.3s ease;
}

.info-card:hover { transform: translateY(-3px); }

.info-card h2 {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.9rem;
    border-radius: 12px;
    background: var(--primary-gradient);
    color: #0a0f18;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

.action-button:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
}

.action-button.copied { background: #10b981; color: white; }

.back-link {
    display: block;
    text-align: center;
    margin-top: 2rem;
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 600;
}

/* Updated Popup Style */
.telegram-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #1a2235;
    color: var(--text-light);
    padding: 35px;
    border-radius: 24px;
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
    z-index: 10000;
    text-align: center;
    width: 90%;
    max-width: 400px;
    display: none;
    border: 1px solid var(--accent-blue);
}

.telegram-popup h2 {
    color: var(--accent-blue);
    margin-bottom: 10px;
    font-size: 1.8rem;
}

.telegram-popup p { margin-bottom: 25px; color: var(--text-muted); }

.join-btn {
    background: var(--primary-gradient);
    color: #000;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-weight: 800;
    border: none;
    margin-bottom: 10px;
    cursor: pointer;
}

.joined-btn {
    background: transparent;
    color: var(--text-muted);
    width: 100%;
    padding: 10px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<main class="container">
    <div id="stream-content"></div>
</main>

<div class="telegram-popup" id="telegramPopup">
    <h2><i class="fa-brands fa-telegram"></i> JOIN US</h2>
    <p>Get instant match alerts, HD links, and live scores on <strong>CricUpdates</strong>.</p>
    <a href="https://t.me/CRICUPDATES777" target="_blank" rel="noopener" style="text-decoration:none;">
        <button class="join-btn">JOIN TELEGRAM CHANNEL</button>
    </a>
    <button class="joined-btn" onclick="document.getElementById('telegramPopup').style.display='none';">Dismiss</button>
</div>

<script>
async function initializeApp() {
    try {
        const response = await fetch('https://allrounderid.pages.dev/id.json');
        if (!response.ok) throw new Error('Failed to fetch JSON');
        const data = await response.json();

        const urlParams = new URLSearchParams(window.location.search);
        const streamId = urlParams.get('id');
        const streamData = data.iframes.find(item => item.id === streamId);

        if (streamData) {
            document.title = `CricLive HD - ${streamData.name}`;
            renderIframeUI(streamData);
            setTimeout(() => {
                document.getElementById('telegramPopup').style.display = 'block';
            }, 1200);
        } else {
            renderErrorUI();
        }
    } catch (err) {
        renderErrorUI();
    }
}

function renderIframeUI(data) {
    const contentDiv = document.getElementById('stream-content');
    contentDiv.innerHTML = `
        <div class="stream-header">
            <h1>CricLive HD</h1>
            <div class="live-badge"><i class="fa-solid fa-tower-broadcast"></i> ${data.name}</div>
        </div>
        <div id="player-container">
            <iframe src="${data.iframeSrc}" style="width:100%; height:100%; border:0;" allow="encrypted-media; autoplay" allowfullscreen></iframe>
        </div>
        <div class="info-grid">
            <div class="info-card">
                <h2>Updates</h2>
                <a href="https://t.me/CRICUPDATES777" target="_blank" rel="noopener" class="action-button">
                    <i class="fa-brands fa-telegram"></i> Join Telegram
                </a>
            </div>
            <div class="info-card">
                <h2>Share Stream</h2>
                <button class="action-button" id="shareButton">
                    <i class="fa-solid fa-share-nodes"></i> Copy Page Link
                </button>
            </div>
        </div>
        <a href="#" class="back-link"><i class="fa-solid fa-chevron-left"></i> View All Schedules</a>
    `;
    
    document.getElementById('shareButton').addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(window.location.href);
            const btn = document.getElementById('shareButton');
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = `<i class="fa-solid fa-share-nodes"></i> Copy Page Link`;
                btn.classList.remove('copied');
            }, 2000);
        } catch (err) { console.error(err); }
    });
}

function renderErrorUI() {
    const contentDiv = document.getElementById('stream-content');
    contentDiv.innerHTML = `<div style="text-align:center; padding:50px;"><h2>Stream Offline</h2><p>Please check back later.</p></div>`;
}

document.addEventListener("DOMContentLoaded", initializeApp);
</script>
</body>
</html>
